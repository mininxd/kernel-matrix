<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Kernel Changer</title>
  </head>
  <body class="px-2 my-4">
    <h1 class="p-2 text-2xl text-center font-bold">Image Kernel Changer
    <span class="badge badge-xs badge-soft badge-info" onclick="matrix_help.showModal()">How it work?</span>
    </h1>
    <div class="flex flex-col items-center gap-4 p-4 max-w-4xl mx-auto">
      <input
        id="file-input"
        type="file"
        class="file-input file-input-bordered w-full max-w-xs"
        accept="image/*"
      />

      <div class="flex flex-row gap-4 justify-center">
        <div>
          <label class="input md:w-36">
            <span class="opacity-40">Multiplier</span>
            <input id="multiplier" type="number" step="0.0001" value="1" />
          </label>
        </div>
        <div>
          <label class="input md:w-36"><span class="opacity-40">Power</span>
            <input id="power" type="number" placeholder="Power" value="1" />
          </label>
        </div>
      </div>

      <div class="flex flex-col items-center gap-2">
        <label class="label">3x3 Kernel Matrix</label>
        <div id="matrix-grid" class="grid grid-cols-3 gap-1">
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="1"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
          <input
            type="number"
            step="0.1"
            class="input input-sm w-16 text-center"
            value="0"
          />
        </div>
      </div>
      <div class="flex justify-center">
      <div class="join w-full">
        <input
          id="rotate"
          type="number"
          class="input join-item w-12"
          placeholder="rotation"
        />
        <select id="rotation" class="select join-item w-32">
          <option disabled>Rotation</option>
          <option selected>clockwise</option>
          <option>counter clockwise</option>
        </select>
              <select id="focal_point" class="select join-item w-auto">
          <option disabled>Focal Point</option>
          <option selected>center</option>
          <option>top left</option>
          <option>top</option>
          <option>top right</option>
          <option>left</option>
          <option>right</option>
          <option>bottom left</option>
          <option>bottom</option>
          <option>bottom right</option>
        </select>
      </div>
      </div>
      <div class="flex justify-center w-full max-w-xs">
        <button id="apply-btn" class="btn btn-primary btn-wide">
          Apply Kernel <kbd class="kbd kbd-xs bg-primary opacity-75 text-xs">ctrl + space</kbd>

        </button>
      </div>

      <div class="grid grid-cols-2 gap-4 mt-2">
        <div class="flex flex-col items-center">
          <div
            class="border border-base-300 rounded-lg overflow-hidden bg-base-200 min-h-[150px] min-w-[150px] flex items-center justify-center w-full"
          >
            <img
              id="preview-img"
              src="-"
              alt="Preview"
              class="max-w-full h-auto hidden"
            />
            <span id="preview-placeholder" class="text-gray-400 text-center p-4"
              >Preview</span
            >
          </div>
        </div>
        <div class="flex flex-col items-center">
          <div
            class="border border-base-300 rounded-lg overflow-hidden bg-base-200 min-h-[150px] min-w-[150px] flex items-center justify-center w-full"
          >
            <img
              id="result-img"
              src="-"
              alt="Result"
              class="max-w-full h-auto hidden"
            />
            <span id="result-placeholder" class="text-gray-400 text-center p-4"
              >Result</span
            >
          </div>
          <div class="w-full">
           <button id="use-as-preview-btn" class="btn w-full btn-xs hidden">
             Use as preview
           </button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6 w-full px-6">
      <a class="text-sm opacity-60 underline" href="https://github.com/mininxd/kernel-matrix" target="_blank">
    <span><i class="ri-github-fill"></i>
Source Code</span>
    </a>
    <span id="reset-data" class="text-sm opacity-60 underline">
Reset Data</span>
    </div>

    <script type="module" src="/src/main.js"></script>
    
<dialog id="matrix_help" class="modal">
  <div class="modal-box">
    <img src="/matrix.gif">
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
  </body>
</html>
